<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de CV Automático</title>
<link rel="stylesheet" href="generador.css">
</head>
<body>

<header>
<div class="header-content">
<h1>📄 Generador de CV Automático</h1>
<button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()">🌙 Modo Oscuro</button>
</div>
<p class="subtitle">Pega tu CV y lo analizamos automáticamente</p>
</header>

<main>
<!-- PASO 1: PEGAR CV -->
<div id="step-input" class="step">
<div class="step-header">
<span class="step-number">1</span>
<h2>Pega tu Currículum</h2>
</div>

<div class="input-section">
<textarea id="cv-texto" rows="15" placeholder="Pega aquí todo el texto de tu currículum...

Ejemplo:

JUAN PÉREZ GARCÍA
Ingeniero en Sistemas
Teléfono: 555-123-4567
Email: juan@email.com
Ciudad: Ciudad de México

PERFIL PROFESIONAL
Ingeniero con 5 años de experiencia en desarrollo de software...

EXPERIENCIA LABORAL
Desarrollador Senior - Empresa ABC (2020 - Actualidad)
- Desarrollo de aplicaciones web
- Liderazgo de equipo técnico

EDUCACIÓN
Ingeniería en Sistemas - Universidad Nacional (2015 - 2019)

HABILIDADES
JavaScript, Python, React, Node.js

IDIOMAS
Español (Nativo), Inglés (Avanzado)

CURSOS
Certificación AWS - Amazon (2021)"></textarea>

<div class="foto-section">
<h3>📷 Foto de Perfil (Opcional)</h3>
<div class="foto-options">
<label class="foto-option">
<input type="radio" name="foto-type" value="url" checked onchange="toggleFotoType()">
<span>URL de imagen</span>
</label>
<label class="foto-option">
<input type="radio" name="foto-type" value="upload" onchange="toggleFotoType()">
<span>Subir archivo</span>
</label>
</div>
<div id="foto-url-container">
<input type="text" id="cv-foto-url" placeholder="https://ejemplo.com/tu-foto.jpg">
</div>
<div id="foto-upload-container" style="display:none;">
<input type="file" id="cv-foto-file" accept="image/*" onchange="handleFotoUpload(event)">
</div>
</div>

<button class="btn-analyze" onclick="analizarCV()">
🤖 Analizar y Generar CV
</button>
</div>
</div>

<!-- PASO 2: VISTA PREVIA -->
<div id="step-preview" class="step" style="display:none;">
<div class="step-header">
<span class="step-number">2</span>
<h2>Vista Previa de tu CV</h2>
</div>

<div class="preview-controls">
<button class="btn-back" onclick="editarCV()">✏️ Editar / Corregir</button>
<button class="btn-new" onclick="nuevoCV()">🔄 Nuevo CV</button>
</div>

<div class="style-selector-preview">
<h3>🎨 Elige un Estilo:</h3>
<div class="style-buttons">
<button class="style-btn active" onclick="cambiarEstilo('moderno')">Moderno</button>
<button class="style-btn" onclick="cambiarEstilo('clasico')">Clásico</button>
<button class="style-btn" onclick="cambiarEstilo('creativo')">Creativo</button>
<button class="style-btn" onclick="cambiarEstilo('minimalista')">Minimalista</button>
<button class="style-btn" onclick="cambiarEstilo('profesional')">Profesional</button>
</div>
</div>

<div class="download-buttons">
<button class="btn-download btn-pdf" onclick="descargarPDF()">
📄 Descargar PDF
</button>
<button class="btn-download btn-word" onclick="descargarWord()">
📝 Descargar Word
</button>
</div>

<div id="cv-preview" class="cv-preview">
<!-- Aquí se muestra el CV generado -->
</div>
</div>

</main>

<script src="generador.js"></script>
</body>
</html>
